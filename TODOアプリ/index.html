<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./CSS/style.css" />
    <script src="./JS/index.js"></script>
  </head>
  <body>
    <main>
      <h1>TODO</h1>
      <section>
        <h2>新規作成</h2>
        <div class="new-todo">
          <div>
            <label for="new-todo">TODO名</label>
            <input type="text" id="new-todo" placeholder="TODO名" />
          </div>

          <div>
            <label for="new-placedent">担当者</label>
            <input type="text" id="new-placedent" placeholder="担当者名" />
          </div>

          <div>
            <label for="lim">期限</label>
            <input type="date" id="lim" placeholder="期限" />
          </div>
          <div>
            <button id="register" class="button" type="button">登録</button>
          </div>
        </div>
      </section>
      <section>
        <h2>TODO一覧</h2>
        <table class="todoList">
          <thead class="thead">
            <tr>
              <th>TODO名</th>
              <th>担当者</th>
              <th>期限</th>
            </tr>
          </thead>
          <tbody id="todo-list">

          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
